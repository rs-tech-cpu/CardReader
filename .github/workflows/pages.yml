name: Deploy store site to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'store_site/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch: # lets you trigger a deploy manually from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer pushes cancel in-progress ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true # auto-enable Pages (GitHub Actions source) if not set up yet

      - name: Upload store_site as the Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: store_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
