workflows:
  # ---------------------------------------------------------------------------
  # Android: produces an installable APK you can download and sideload onto a
  # phone. No local Android SDK or cable needed — Codemagic builds it in the
  # cloud. The APK is debug-signed (fine for testing/sideloading).
  # ---------------------------------------------------------------------------
  android-workflow:
    name: Android APK
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
    scripts:
      - name: Flutter pub get
        script: flutter pub get
      - name: Analyze
        script: flutter analyze
      - name: Test
        script: flutter test
      - name: Build APK
        script: flutter build apk --release
    artifacts:
      - build/**/outputs/**/*.apk
    # Optional: get the APK emailed to you when the build finishes.
    # Fill in your address and uncomment.
    # publishing:
    #   email:
    #     recipients:
    #       - ankursetia@gmail.com
    #     notify:
    #       success: true
    #       failure: true

  # ---------------------------------------------------------------------------
  # iOS: builds without code signing. This validates that the iOS app compiles
  # in the cloud. The resulting .app is NOT installable on a device — an
  # installable .ipa requires a paid Apple Developer account + signing set up
  # in Codemagic (see the notes I gave you).
  # ---------------------------------------------------------------------------
  ios-workflow:
    name: iOS (no code signing)
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
    scripts:
      - name: Flutter pub get
        script: flutter pub get
      - name: Install CocoaPods
        script: find . -name "Podfile" -execdir pod install \;
      - name: Build iOS (no codesign)
        script: flutter build ios --release --no-codesign
    artifacts:
      - build/ios/iphoneos/*.app
