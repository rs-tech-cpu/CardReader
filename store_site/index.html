<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Aurora Goods — Demo Store</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛍️</text></svg>" />
<meta name="theme-color" content="#0f0c29" />
<style>
  :root {
    --bg-top: #0f0c29;
    --bg-mid: #302b63;
    --bg-bot: #24243e;
    --accent: #7c5cff;
    --accent-glow: #00e0ff;
    --silver: #e6e8ef;
    --silver-dim: #b4b8c5;
    --glass: rgba(255, 255, 255, 0.08);
    --glass-border: rgba(255, 255, 255, 0.18);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: var(--silver);
    background: linear-gradient(135deg, var(--bg-top) 0%, var(--bg-mid) 55%, var(--bg-bot) 100%);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  header {
    position: sticky; top: 0; z-index: 20;
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px;
    backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
    background: rgba(15, 12, 41, 0.55);
    border-bottom: 1px solid var(--glass-border);
  }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand .logo {
    width: 34px; height: 34px; border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), var(--accent-glow));
    display: grid; place-items: center; font-size: 18px;
  }
  .brand h1 { font-size: 18px; font-weight: 700; letter-spacing: .3px; }
  .brand small { display: block; color: var(--silver-dim); font-weight: 400; font-size: 11px; }
  .cart-btn {
    position: relative; cursor: pointer;
    border: 1px solid var(--glass-border); background: var(--glass);
    color: var(--silver); border-radius: 12px; padding: 10px 14px; font-size: 15px;
    display: flex; align-items: center; gap: 8px;
  }
  .cart-btn .count {
    position: absolute; top: -8px; right: -8px;
    background: linear-gradient(135deg, var(--accent), var(--accent-glow));
    color: #fff; font-size: 11px; font-weight: 700;
    min-width: 20px; height: 20px; border-radius: 10px;
    display: grid; place-items: center; padding: 0 5px;
  }

  .demo-banner {
    text-align: center; font-size: 12px; color: var(--silver-dim);
    padding: 8px; background: rgba(124, 92, 255, 0.12);
    border-bottom: 1px solid var(--glass-border);
  }

  main { max-width: 900px; margin: 0 auto; padding: 24px 20px 80px; }
  main > h2 { font-size: 22px; margin-bottom: 4px; }
  main > p.sub { color: var(--silver-dim); margin-bottom: 22px; font-size: 14px; }

  .grid {
    display: grid; gap: 16px;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  }
  .card {
    border: 1px solid var(--glass-border);
    background: var(--glass);
    border-radius: 20px; padding: 16px;
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    display: flex; flex-direction: column;
  }
  .card .thumb {
    height: 110px; border-radius: 14px; margin-bottom: 12px;
    display: grid; place-items: center; font-size: 46px;
  }
  .card h3 { font-size: 15px; font-weight: 600; margin-bottom: 2px; }
  .card .cat { font-size: 12px; color: var(--silver-dim); margin-bottom: 10px; }
  .card .row { display: flex; align-items: center; justify-content: space-between; margin-top: auto; }
  .card .price { font-size: 17px; font-weight: 700; }
  .add {
    cursor: pointer; border: none; border-radius: 12px; padding: 9px 14px;
    font-weight: 600; font-size: 13px; color: #fff;
    background: linear-gradient(135deg, var(--accent), rgba(0, 224, 255, 0.7));
  }
  .add:active { transform: scale(0.96); }

  /* Cart slide-over */
  .overlay {
    position: fixed; inset: 0; background: rgba(0, 0, 0, 0.5);
    opacity: 0; pointer-events: none; transition: opacity .25s; z-index: 30;
  }
  .overlay.open { opacity: 1; pointer-events: auto; }
  .drawer {
    position: fixed; top: 0; right: 0; height: 100%; width: min(400px, 88vw);
    background: linear-gradient(160deg, #1a1830, #14121f);
    border-left: 1px solid var(--glass-border);
    transform: translateX(100%); transition: transform .3s cubic-bezier(.2,.8,.2,1);
    z-index: 31; display: flex; flex-direction: column;
  }
  .drawer.open { transform: translateX(0); }
  .drawer header { position: static; background: transparent; border: none; }
  .drawer h2 { font-size: 18px; }
  .close { cursor: pointer; background: none; border: none; color: var(--silver); font-size: 24px; }
  .items { flex: 1; overflow-y: auto; padding: 8px 20px; }
  .empty { text-align: center; color: var(--silver-dim); margin-top: 60px; font-size: 14px; }
  .item {
    display: flex; align-items: center; gap: 12px; padding: 12px 0;
    border-bottom: 1px solid rgba(255,255,255,.06);
  }
  .item .ic { font-size: 26px; width: 40px; text-align: center; }
  .item .meta { flex: 1; }
  .item .meta .n { font-size: 14px; font-weight: 600; }
  .item .meta .p { font-size: 12px; color: var(--silver-dim); }
  .qty { display: flex; align-items: center; gap: 8px; }
  .qty button {
    width: 26px; height: 26px; border-radius: 8px; cursor: pointer;
    border: 1px solid var(--glass-border); background: var(--glass); color: var(--silver);
    font-size: 15px; line-height: 1;
  }
  .cart-foot { padding: 18px 20px 24px; border-top: 1px solid var(--glass-border); }
  .totals { display: flex; justify-content: space-between; margin-bottom: 14px; }
  .totals .lbl { color: var(--silver-dim); }
  .totals .amt { font-size: 22px; font-weight: 800; }
  .checkout {
    width: 100%; cursor: pointer; border: none; border-radius: 16px; padding: 16px;
    font-size: 16px; font-weight: 700; color: #fff;
    background: linear-gradient(135deg, var(--accent), rgba(0, 224, 255, 0.75));
    box-shadow: 0 10px 28px -6px rgba(124, 92, 255, 0.6);
  }
  .checkout:disabled { opacity: .5; box-shadow: none; cursor: default; }
  .checkout:active:not(:disabled) { transform: scale(0.98); }
  .hint { text-align: center; font-size: 11px; color: var(--silver-dim); margin-top: 10px; }

  #toast {
    position: fixed; left: 50%; bottom: 28px; transform: translate(-50%, 20px);
    max-width: 90vw; z-index: 50;
    background: rgba(20, 18, 31, 0.95); color: var(--silver);
    border: 1px solid var(--glass-border); border-radius: 14px;
    padding: 14px 18px; font-size: 13px; text-align: center; line-height: 1.4;
    opacity: 0; pointer-events: none; transition: opacity .25s, transform .25s;
    box-shadow: 0 10px 30px -8px rgba(0,0,0,.6);
  }
  #toast.show { opacity: 1; transform: translate(-50%, 0); }
</style>
</head>
<body>
  <div class="demo-banner">Demo store · products &amp; checkout are simulated (no real payment)</div>
  <header>
    <div class="brand">
      <div class="logo">🛍️</div>
      <div>
        <h1>Aurora Goods</h1>
        <small>Everyday things, elevated</small>
      </div>
    </div>
    <button class="cart-btn" id="cartBtn">
      🛒 Cart
      <span class="count" id="count">0</span>
    </button>
  </header>

  <main>
    <h2>Featured</h2>
    <p class="sub">Tap “Add” to drop an item in your cart, then check out.</p>
    <div class="grid" id="grid"></div>
  </main>

  <div class="overlay" id="overlay"></div>
  <aside class="drawer" id="drawer" aria-label="Shopping cart">
    <header>
      <h2>Your cart</h2>
      <button class="close" id="closeBtn" aria-label="Close cart">×</button>
    </header>
    <div class="items" id="items"></div>
    <div class="cart-foot">
      <div class="totals">
        <span class="lbl">Total</span>
        <span class="amt" id="total">$0.00</span>
      </div>
      <button class="checkout" id="checkout" disabled>Checkout</button>
      <p class="hint">Checkout opens the Platinum Reader app to tap for payment.</p>
    </div>
  </aside>

  <div id="toast" role="status" aria-live="polite"></div>

<script>
  // ---- Fake catalogue -------------------------------------------------------
  const PRODUCTS = [
    { id: 'p1', name: 'Nimbus Headphones', cat: 'Audio',      price: 129.00, icon: '🎧', grad: 'linear-gradient(135deg,#3a3a52,#15151f)' },
    { id: 'p2', name: 'Aurora Desk Lamp',  cat: 'Home',       price: 49.50,  icon: '💡', grad: 'linear-gradient(135deg,#7c5cff,#00e0ff)' },
    { id: 'p3', name: 'Lumen Water Bottle',cat: 'Lifestyle',  price: 24.00,  icon: '🥤', grad: 'linear-gradient(135deg,#1f9d8f,#0f5f57)' },
    { id: 'p4', name: 'Orbit Smart Watch', cat: 'Wearables',  price: 199.99, icon: '⌚', grad: 'linear-gradient(135deg,#3a3a52,#23233a)' },
    { id: 'p5', name: 'Pulse Sneakers',    cat: 'Footwear',   price: 89.00,  icon: '👟', grad: 'linear-gradient(135deg,#ff6ea9,#7c5cff)' },
    { id: 'p6', name: 'Halo Sunglasses',   cat: 'Accessories',price: 59.00,  icon: '🕶️', grad: 'linear-gradient(135deg,#24243e,#0f0c29)' },
    { id: 'p7', name: 'Cascade Backpack',  cat: 'Bags',       price: 74.25,  icon: '🎒', grad: 'linear-gradient(135deg,#0f9b8e,#134e5e)' },
    { id: 'p8', name: 'Ember Coffee Mug',  cat: 'Kitchen',    price: 18.00,  icon: '☕', grad: 'linear-gradient(135deg,#b79a55,#5c4a1e)' },
  ];

  // The Android app's package id (must match applicationId in build.gradle.kts).
  const ANDROID_PACKAGE = 'com.example.card_reader_1';

  // Build the link that hands the amount to the app. Android Chrome reliably
  // opens `intent://` URLs (plain custom-scheme links are often ignored),
  // so we use those on Android and the custom scheme everywhere else.
  function deepLink(amount) {
    const amt = amount.toFixed(2);
    const isAndroid = /android/i.test(navigator.userAgent || '');
    if (isAndroid) {
      return `intent://tap?amount=${amt}#Intent;scheme=cardreader;` +
             `package=${ANDROID_PACKAGE};end`;
    }
    return `cardreader://tap?amount=${amt}`;
  }

  const cart = new Map(); // id -> qty

  const $ = (id) => document.getElementById(id);

  function renderGrid() {
    $('grid').innerHTML = PRODUCTS.map(p => `
      <div class="card">
        <div class="thumb" style="background:${p.grad}">${p.icon}</div>
        <h3>${p.name}</h3>
        <div class="cat">${p.cat}</div>
        <div class="row">
          <span class="price">$${p.price.toFixed(2)}</span>
          <button class="add" data-id="${p.id}">Add</button>
        </div>
      </div>
    `).join('');
    document.querySelectorAll('.add').forEach(b =>
      b.addEventListener('click', () => addToCart(b.dataset.id))
    );
  }

  function addToCart(id) {
    cart.set(id, (cart.get(id) || 0) + 1);
    renderCart();
    openCart();
  }

  function changeQty(id, delta) {
    const next = (cart.get(id) || 0) + delta;
    if (next <= 0) cart.delete(id);
    else cart.set(id, next);
    renderCart();
  }

  function cartTotal() {
    let t = 0;
    for (const [id, qty] of cart) {
      t += PRODUCTS.find(p => p.id === id).price * qty;
    }
    return t;
  }

  function renderCart() {
    const count = [...cart.values()].reduce((a, b) => a + b, 0);
    $('count').textContent = count;

    if (cart.size === 0) {
      $('items').innerHTML = '<div class="empty">Your cart is empty.</div>';
    } else {
      $('items').innerHTML = [...cart.entries()].map(([id, qty]) => {
        const p = PRODUCTS.find(x => x.id === id);
        return `
          <div class="item">
            <div class="ic">${p.icon}</div>
            <div class="meta">
              <div class="n">${p.name}</div>
              <div class="p">$${p.price.toFixed(2)} each</div>
            </div>
            <div class="qty">
              <button data-id="${id}" data-d="-1">−</button>
              <span>${qty}</span>
              <button data-id="${id}" data-d="1">+</button>
            </div>
          </div>`;
      }).join('');
      $('items').querySelectorAll('.qty button').forEach(b =>
        b.addEventListener('click', () => changeQty(b.dataset.id, +b.dataset.d))
      );
    }

    const total = cartTotal();
    $('total').textContent = '$' + total.toFixed(2);
    $('checkout').disabled = total <= 0;
  }

  function openCart() { $('drawer').classList.add('open'); $('overlay').classList.add('open'); }
  function closeCart() { $('drawer').classList.remove('open'); $('overlay').classList.remove('open'); }

  function toast(msg, ms = 3000) {
    const el = $('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toast._t);
    toast._t = setTimeout(() => el.classList.remove('show'), ms);
  }

  function checkout() {
    const total = cartTotal();
    if (total <= 0) return;

    toast('Opening Platinum Reader…');

    // Heuristic: if the app opens, this tab gets backgrounded (document.hidden).
    // If we're still visible ~1.5s later, no app handled the link.
    const t0 = Date.now();
    setTimeout(() => {
      if (!document.hidden && Date.now() - t0 < 2500) {
        toast('Couldn’t open the app. Open this page on the phone that has Platinum Reader installed.', 6000);
      }
    }, 1500);

    // Hand the amount to the Platinum Reader app.
    window.location.href = deepLink(total);
  }

  $('cartBtn').addEventListener('click', openCart);
  $('closeBtn').addEventListener('click', closeCart);
  $('overlay').addEventListener('click', closeCart);
  $('checkout').addEventListener('click', checkout);

  renderGrid();
  renderCart();
</script>
</body>
</html>
